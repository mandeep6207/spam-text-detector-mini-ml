<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spam Text Detector</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  </head>
  <body>
    <div class="page-wrap">
      <div class="container py-5">
        <div class="row justify-content-center">
          <div class="col-lg-8 col-md-10">
            <div class="app-card shadow-lg">
              <h1 class="text-center mb-3">Spam Text Detector</h1>
              <p class="text-center text-muted mb-4">
                Enter a message and instantly check whether it looks like spam.
              </p>

              <div class="mb-3">
                <label for="messageInput" class="form-label fw-semibold">Message</label>
                <textarea
                  id="messageInput"
                  class="form-control"
                  rows="5"
                  placeholder="Type or paste your message here..."
                ></textarea>
                <div class="sample-row mt-2">
                  <button class="btn btn-sm btn-outline-secondary sample-btn" data-sample="Win a free vacation now! Click to claim.">Spam Sample</button>
                  <button class="btn btn-sm btn-outline-secondary sample-btn" data-sample="Can we reschedule our meeting to tomorrow morning?">Safe Sample</button>
                </div>
              </div>

              <div class="d-grid mb-4">
                <button id="checkBtn" class="btn btn-primary btn-lg">Check Spam</button>
              </div>

              <div id="resultCard" class="result-card d-none">
                <h5 class="mb-2">Result</h5>
                <p class="mb-1">
                  Prediction:
                  <span id="resultLabel" class="fw-bold"></span>
                </p>
                <p class="mb-0">
                  Probability:
                  <span id="resultProbability" class="fw-semibold"></span>
                </p>
                <p class="mb-0 mt-1">
                  Confidence:
                  <span id="resultConfidence" class="fw-semibold"></span>
                </p>
                <p class="mb-0 mt-1">
                  Risk Level:
                  <span id="resultRisk" class="fw-semibold text-uppercase"></span>
                </p>
              </div>

              <div id="errorAlert" class="alert alert-danger d-none mt-3" role="alert"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const messageInput = document.getElementById("messageInput");
      const checkBtn = document.getElementById("checkBtn");
      const resultCard = document.getElementById("resultCard");
      const resultLabel = document.getElementById("resultLabel");
      const resultProbability = document.getElementById("resultProbability");
      const resultConfidence = document.getElementById("resultConfidence");
      const resultRisk = document.getElementById("resultRisk");
      const errorAlert = document.getElementById("errorAlert");

      function showError(message) {
        errorAlert.textContent = message;
        errorAlert.classList.remove("d-none");
      }

      function clearError() {
        errorAlert.classList.add("d-none");
      }

      checkBtn.addEventListener("click", async () => {
        clearError();
        resultCard.classList.add("d-none");

        const text = messageInput.value.trim();
        if (!text) {
          showError("Please enter a message.");
          return;
        }

        try {
          const response = await fetch("/predict", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({ text }),
          });

          const data = await response.json();

          if (!response.ok) {
            throw new Error(data.error || "Prediction failed.");
          }

          const isSpam = data.label === "Spam";
          resultLabel.textContent = data.label;
          resultProbability.textContent = `${data.probability}% Spam`;
          resultConfidence.textContent = `${data.confidence}%`;
          resultRisk.textContent = data.risk_level;

          resultCard.classList.remove("result-spam", "result-safe");
          resultCard.classList.add(isSpam ? "result-spam" : "result-safe");
          resultCard.classList.remove("d-none");
        } catch (error) {
          showError(error.message || "Something went wrong.");
        }
      });
    </script>
  </body>
</html>
